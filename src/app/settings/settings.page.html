<ion-content>

  <app-header></app-header>

  <div class="max-w-4xl mx-auto px-6 py-12 min-h-screen">

    <div class="flex gap-8 mb-8 border-b border-gray-500">

      <button class="pb-2 border-b-2 border-[#2E473B] font-['Cormorant_Garamond'] text-2xl text-[#1A1614]">{{ 'SETTINGS.TAB_ACCOUNT' | translate }}</button>

      <button class="pb-2 text-gray-500 font-['Cormorant_Garamond'] text-2xl hover:text-[#1A1614] transition-colors">{{ 'SETTINGS.TAB_BLOCKED' | translate }}</button>

    </div>

    <div class="border border-[#C5A059]/30 p-12 bg-white/50 relative">

      <div class="space-y-8 max-w-2xl">

        <div class="flex items-center">

          <label class="w-1/3 text-sm font-lato text-gray-500">{{ 'SETTINGS.USER_LABEL' | translate }}</label>

          <div class="w-2/3 flex items-center border-b border-gray-500">

            <input [(ngModel)]="user.username" type="text" class="w-full py-2 outline-none bg-transparent text-black">

            <button (click)="saveSettings()" class="text-[10px] uppercase text-[#C5A059] font-bold ml-2 hover:underline cursor-pointer">{{ 'SETTINGS.CHANGE' | translate }}</button>

          </div>

        </div>

        <div class="flex items-center">

          <label class="w-1/3 text-sm font-lato text-gray-600">{{ 'SETTINGS.PASS_LABEL' | translate }}</label>

          <div class="w-2/3 flex items-center border-b border-gray-500">

            <span class="w-full py-2 text-black opacity-50">••••••••</span>

            <button (click)="sendResetPassword()" class="text-[10px] uppercase text-[#C5A059] font-bold ml-2 hover:underline cursor-pointer whitespace-nowrap">
              {{ 'SETTINGS.RESET_BTN' | translate }}
            </button>

          </div>

        </div>

        <div class="flex items-center">

          <label class="w-1/3 text-sm font-lato text-gray-600">{{ 'SETTINGS.EMAIL_LABEL' | translate }}</label>

          <div class="w-2/3 flex items-center border-b border-gray-500">

            <input [(ngModel)]="user.email" type="email" class="w-full py-2 text-black outline-none bg-transparent">

            <button (click)="saveSettings()" class="text-[10px] uppercase text-[#C5A059] font-bold ml-2 hover:underline cursor-pointer">{{ 'SETTINGS.CHANGE' | translate }}</button>

          </div>

        </div>

        <div class="flex items-center">

          <label class="w-1/3 text-sm font-lato text-gray-600">{{ 'SETTINGS.DATA_LABEL' | translate }}</label>

          <div class="w-2/3">

            <button (click)="exportData()" class="px-8 py-2 border border-[#C5A059] text-sm text-black hover:bg-[#FDFBF7] transition-colors">{{ 'SETTINGS.DOWNLOAD_BTN' | translate }}</button>

          </div>

        </div>

        <div class="flex items-center">

          <label class="w-1/3 text-sm font-lato text-gray-600">{{ 'SETTINGS.LANG_LABEL' | translate }}</label>

          <div class="w-2/3 flex items-center border-b border-gray-500">

            <select [(ngModel)]="user.language" class="w-full text-black py-2 bg-transparent outline-none appearance-none cursor-pointer">

              <option value="Español">{{ 'SETTINGS.LANGUAGES.ES' | translate }}</option>
              <option value="Inglés">{{ 'SETTINGS.LANGUAGES.EN' | translate }}</option>
              <option value="Francés">{{ 'SETTINGS.LANGUAGES.FR' | translate }}</option>

            </select>

            <button (click)="saveSettings()" class="text-[10px] uppercase text-[#C5A059] font-bold ml-2 hover:underline cursor-pointer">{{ 'SETTINGS.CHANGE' | translate }}</button>

          </div>

        </div>

      </div>

      <div class="mt-12">

        <button (click)="saveSettings()" class="px-16 py-2 border border-[#1A1614] text-sm uppercase tracking-widest hover:bg-[#1A1614] hover:text-white transition-all">{{ 'SETTINGS.SUBMIT' | translate }}</button>

      </div>

    </div>

    <div class="mt-8">

      <button (click)="logout()" class="text-sm font-lato text-gray-800 hover:underline cursor-pointer">{{ 'SETTINGS.LOGOUT' | translate }}</button>

    </div>

  </div>

  <app-footer></app-footer>

</ion-content>
