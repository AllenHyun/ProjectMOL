<ion-content>

  <app-header></app-header>

  <div class="max-w-4xl mx-auto px-6 py-12 min-h-screen">

    <div class="flex gap-8 mb-8 border-b border-gray-500">

      <button class="pb-2 border-b-2 border-[#2E473B] font-['Cormorant_Garamond'] text-2xl text-[#1A1614]">Cuenta</button>

      <button class="pb-2 text-gray-500 font-['Cormorant_Garamond'] text-2xl hover:text-[#1A1614] transition-colors">Perfiles bloqueados</button>

    </div>

    <div class="border border-[#C5A059]/30 p-12 bg-white/50 relative">

      <div class="space-y-8 max-w-2xl">

        <div class="flex items-center">

          <label class="w-1/3 text-sm font-lato text-gray-500">Nombre de usuario</label>

          <div class="w-2/3 flex items-center border-b border-gray-500">

            <input [(ngModel)]="user.username" type="text" class="w-full py-2 outline-none bg-transparent text-black">

            <button (click)="saveSettings()" class="text-[10px] uppercase text-[#C5A059] font-bold ml-2 hover:underline cursor-pointer">Cambiar</button>

          </div>

        </div>

        <div class="flex items-center">

          <label class="w-1/3 text-sm font-lato text-gray-600">Nueva Contraseña</label>

          <div class="w-2/3 flex items-center border-b border-gray-500">

            <input [(ngModel)]="newPassword" type="password" placeholder="********" class="w-full py-2 outline-none bg-transparent text-black">

            <button (click)="saveSettings()" class="text-[10px] uppercase text-[#C5A059] font-bold ml-2 hover:underline cursor-pointer">Cambiar</button>

          </div>

        </div>

        <div class="flex items-center">

          <label class="w-1/3 text-sm font-lato text-gray-600">Correo electrónico</label>

          <div class="w-2/3 flex items-center border-b border-gray-500">

            <input [(ngModel)]="user.email" type="email" class="w-full py-2 text-black outline-none bg-transparent">

            <button (click)="saveSettings()" class="text-[10px] uppercase text-[#C5A059] font-bold ml-2 hover:underline cursor-pointer">Cambiar</button>

          </div>

        </div>

        <div class="flex items-center">

          <label class="w-1/3 text-sm font-lato text-gray-600">Cumpleaños</label>

          <div class="w-2/3 flex gap-4">

            <div class="flex-1 border-b border-gray-500">
              <select [(ngModel)]="user.birthday.day" class="w-full py-2 bg-transparent text-black outline-none appearance-none cursor-pointer">
                <option [value]="null" disabled selected>Día</option>
                @for (day of days; track day) {
                  <option [value]="day">{{day}}</option>
                }
              </select>
            </div>

            <div class="flex-[2] border-b border-gray-500">
              <select [(ngModel)]="user.birthday.month" class="w-full py-2 bg-transparent text-black outline-none appearance-none cursor-pointer">
                <option [value]="null" disabled selected>Mes</option>
                @for (month of months; track month) {
                  <option [value]="month">{{month}}</option>
                }
              </select>
            </div>

          </div>

        </div>

        <div class="flex items-center">

          <label class="w-1/3 text-sm font-lato text-gray-600">Descargar mis datos</label>

          <div class="w-2/3">

            <button (click)="exportData()" class="px-8 py-2 border border-[#C5A059] text-sm text-black hover:bg-[#FDFBF7] transition-colors">Descargar</button>

          </div>

        </div>

        <div class="flex items-center">

          <label class="w-1/3 text-sm font-lato text-gray-600">Idioma</label>

          <div class="w-2/3 flex items-center border-b border-gray-500">

            <select [(ngModel)]="user.language" class="w-full text-black py-2 bg-transparent outline-none appearance-none cursor-pointer">

              <option value="Español">Español</option>
              <option value="Inglés">Inglés</option>
              <option value="Francés">Francés</option>

            </select>

            <button (click)="saveSettings()" class="text-[10px] uppercase text-[#C5A059] font-bold ml-2 hover:underline cursor-pointer">Cambiar</button>

          </div>

        </div>

      </div>

      <div class="mt-12">

        <button (click)="saveSettings()" class="px-16 py-2 border border-[#1A1614] text-sm uppercase tracking-widest hover:bg-[#1A1614] hover:text-white transition-all">Enviar</button>

      </div>

    </div>

    <div class="mt-8">

      <button (click)="logout()" class="text-sm font-lato text-gray-800 hover:underline cursor-pointer">Cerrar sesión</button>

    </div>

  </div>

  <app-footer></app-footer>

</ion-content>
