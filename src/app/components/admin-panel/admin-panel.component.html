<div class="flex flex-col h-full bg-[#2C1E16CC] text-white overflow-hidden transition-all duration-300">

  <div (click)="toggleMenu()" class="p-6 flex justify-between items-center cursor-pointer lg:cursor-default lg:pointer-events-none lg:justify-center border-b border-[#C5A059]/30 lg:border-b-0">

    <div class="flex items-center gap-3">

      <ion-icon name="grid-outline" class="text-[#C5A059] lg:hidden"></ion-icon>
      <h1 class="lg:text-lg text-sm font-lato text-center mb-2 tracking-widest uppercase">{{ 'ADMIN.TITLE' | translate }}</h1>

    </div>

    <ion-icon [name]="isCollapsed ? 'chevron-down-outline' : 'chevron-up-outline'" class="lg:hidden text-[#C5A059] text-xl transition-transform"></ion-icon>

  </div>

  <div class="hidden lg:block border-t border-[#C5A059] mb-8 mx-6"></div>

  <nav [class.hidden]="isCollapsed" class="flex flex-col lg:!flex lg:pt-0 gap-6 p-6 lg:gap-10 transition-all duration-500">

    @for (option of optionsAdmin; track option.name){
      <a [routerLink]="option.path" (click)="isCollapsed = true" routerLinkActive="text-[#6FAB72] font-semibold lg:border-l-2 border-[#6FAB72] lg:pl-4" class="text-base lg:text-lg hover:text-[#6FAB72] transition-all whitespace-nowrap">{{ option.name }}</a>
    }
  </nav>

</div>
