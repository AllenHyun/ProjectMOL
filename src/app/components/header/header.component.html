<ion-header>
  <ion-toolbar style="--background: #2C1E16CC; color: white;">

    <ion-buttons slot="start">
      <span class="text-white ml-4" style="font-family: 'Playfair Display', serif; font-size: 1.5rem;">PROJECT M.O.L</span>
    </ion-buttons>

    <ion-searchbar class="menu-escritorio" placeholder="Descubre..." style="--placeholder-color: #555555 ;--background: white; --icon-color:black; width: 300px;"></ion-searchbar>

    <ion-buttons slot="end" class="menu-escritorio" style="gap: 1rem">
      <ion-button class="font-lato text-white text-sm" style="text-transform: none;">Inicio</ion-button>
      <ion-button class="font-lato text-white text-sm" style="text-transform: none;">Resúmenes</ion-button>
      <ion-button class="font-lato text-white text-sm" style="text-transform: none;">Reseñas</ion-button>
    </ion-buttons>

    <ion-buttons slot="end" class="menu-escritorio" style="padding-left: 2rem">
      <ion-button class="font-lato text-sm" style="text-transform: none; --color:#C5A059">Registrar/Inicio de sesión</ion-button>
    </ion-buttons>

    <ion-buttons slot="end" class="menu-movil">
      <ion-button>
        <ion-icon name="menu" style="color: white; font-size: 2.5rem;"></ion-icon>
      </ion-button>
    </ion-buttons>

  </ion-toolbar>
</ion-header>
