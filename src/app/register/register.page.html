

<ion-content>
  <app-header [isAuthPage]="true"></app-header>
  <div class="relative min-h-[90vh]">
    <img class="absolute w-full h-full object-cover" src="assets/icon/register_back.png">
    <!-- filtro verde para la imagen de fondo -->
    <div class="absolute inset-0 bg-[#2E473B66]"></div>
    <div class="relative flex flex-col md:flex-row z-10 h-full items-center justify-center">
      <div class="hidden md:flex w-full md:w-1/2 justify-center">
        <h1 class="text-white text-7xl font-['Cormorant_Garamond'] leading-tight p-[70px]">
          ¡Crea una cuenta nueva y revisa los resúmenes de tus libros preferidos!
        </h1>
      </div>
      <div class="w-full md:w-1/2 p-[70px]">
        <ion-card class="bg-white rounded-2xl p-8 shadow-2xl">
          <ion-card-title class="text-black text-3xl font-[Lato] font-bold text-center">
            Crea una nueva cuenta
          </ion-card-title>
          <ion-card-content>

            <div class="flex flex-col gap-4">
              <button (click)="registerWithGoogle()" class="w-full flex items-center justify-center border bg-gray-100 border-gray-500 py-3 rounded-lg text-black  transition-all gap-5">
                <ion-icon name="logo-google" class="text-xl text-red-600"></ion-icon>
                Registrate con Google
              </button>

            </div>

            <div class="flex items-center p-4">
              <div class="flex-1 border-t border-gray-400"></div>
              <span class="px-3">o</span>
              <div class="flex-1 border-t border-gray-400"></div>
            </div>

            <div class="mt-6 text-left">
              <div class="text-left">
                <label class="text-sm font-semibold text-gray-700 ml-1">Correo electrónico</label>
                <ion-input
                  type="email"
                  placeholder="ejemplo@correo.com"
                  [(ngModel)]="email"
                  class="mt-1 border border-gray-300 rounded-xl p-3 w-full"
                  style="--padding-start: 10px;">
                </ion-input>

                <label class="text-sm font-semibold text-gray-700 ml-1 mt-4">Contraseña</label>
                <ion-input
                  type="password"
                  placeholder="**********"
                  [(ngModel)]="password"
                  class="mt-1 border border-gray-300 rounded-xl p-3 w-full"
                  style="--padding-start: 10px;">
                </ion-input>
              </div>

            </div>

            <button (click)="onRegister()" class="w-full bg-[#2E473B] text-white font-bold py-4 rounded-xl mt-8">
              Registrarme
            </button>

            <button (click)="countCreated()" class="w-full p-3 text-center">
              ¿Ya tienes cuenta? Iniciar sesión
            </button>
          </ion-card-content>
        </ion-card>
      </div>
    </div>

  </div>
  <app-footer></app-footer>
</ion-content>
